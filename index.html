<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contas a Pagar</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
:root{--bg:#f7f6f3;--surface:#fff;--surface2:#f1f0ed;--border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.18);--text:#1a1a18;--text2:#6b6a65;--text3:#9b9a95;--blue:#185FA5;--blue-bg:#E6F1FB;--green:#1D9E75;--green-bg:#EAF3DE;--green-text:#3B6D11;--amber:#854F0B;--amber-bg:#FAEEDA;--red:#A32D2D;--red-bg:#FCEBEB;--r:8px;--rl:12px}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a18;--surface:#252522;--surface2:#2e2e2b;--border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.18);--text:#f0efe9;--text2:#a09f99;--text3:#6b6a65;--blue:#85B7EB;--blue-bg:#042C53;--green:#5DCAA5;--green-bg:#04342C;--green-text:#9FE1CB;--amber:#FAC775;--amber-bg:#412402;--red:#F09595;--red-bg:#501313}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI',system-ui,sans-serif;min-height:100vh}
.app{max-width:860px;margin:0 auto;padding:1.5rem 1rem 3rem}
.header-row{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:1.25rem}
.app-header h1{font-size:22px;font-weight:600;display:flex;align-items:center;gap:8px}
.app-header h1 i{font-size:22px;color:var(--blue)}
.app-header p{font-size:13px;color:var(--text2);margin-top:3px}
.sync-info{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px;margin-top:6px}
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.filter-group{display:flex;background:var(--surface2);border-radius:var(--r);border:.5px solid var(--border);overflow:hidden;flex-shrink:0}
.filter-btn{padding:6px 14px;font-size:13px;background:transparent;border:none;cursor:pointer;color:var(--text2);transition:all .15s;font-family:inherit}
.filter-btn.active{background:var(--surface);color:var(--text);font-weight:500;box-shadow:0 0 0 .5px var(--border2) inset}
.search-wrap{position:relative;flex:1;min-width:160px}
.search-wrap i{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}
.search-input{width:100%;padding:6px 10px 6px 30px;font-size:13px;border-radius:var(--r);border:.5px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;outline:none}
.month-nav{display:flex;align-items:center;gap:4px;flex-shrink:0}
.nav-btn{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:5px 9px;cursor:pointer;color:var(--text2);font-size:16px;display:flex;align-items:center;transition:border-color .15s}
.month-label{font-size:13px;font-weight:500;min-width:120px;text-align:center}
.refresh-btn{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:6px 12px;cursor:pointer;font-size:13px;color:var(--text2);display:flex;align-items:center;gap:5px;font-family:inherit;flex-shrink:0}
.refresh-btn.loading i{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.25rem}
@media(max-width:600px){.summary{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--surface);border:.5px solid var(--border);border-radius:var(--rl);padding:12px 14px}
.stat-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.stat-val{font-size:17px;font-weight:600;color:var(--text);margin-top:3px}
.stat-val.c-red{color:var(--red)}.stat-val.c-green{color:var(--green)}.stat-val.c-amber{color:var(--amber)}
.progress-wrap{margin-bottom:1.25rem}
.progress-header{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:5px}
.progress-bar{height:6px;background:var(--surface2);border-radius:100px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:100px;transition:width .4s ease}
.day-group{margin-bottom:1.25rem}
.day-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;padding:0 2px 6px;display:flex;align-items:center;gap:6px;border-bottom:.5px solid var(--border);margin-bottom:6px}
.day-label .dot{width:5px;height:5px;border-radius:50%;background:var(--border2);flex-shrink:0}
.day-label.lbl-today{color:var(--blue)}.day-label.lbl-today .dot{background:var(--blue)}
.day-label.lbl-overdue{color:var(--red)}.day-label.lbl-overdue .dot{background:var(--red)}
.bill-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--rl);padding:10px 14px;margin-bottom:5px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color .15s,opacity .2s;user-select:none}
.bill-card:hover{border-color:var(--border2)}
.bill-card.paid{opacity:.5}
.bill-card.overdue{border-left:3px solid var(--red)}
.bill-card.due-today{border-left:3px solid var(--blue)}
.bill-card.due-soon{border-left:3px solid var(--amber)}
.check-btn{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.check-btn.checked{background:var(--green);border-color:var(--green)}
.check-btn i{font-size:12px;color:white;opacity:0;transition:opacity .15s}
.check-btn.checked i{opacity:1}
.bill-info{flex:1;min-width:0}
.bill-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bill-card.paid .bill-name{text-decoration:line-through;color:var(--text2)}
.bill-sub{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.bill-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.bill-value{font-size:14px;font-weight:600}
.bill-value.var{font-size:12px;color:var(--text2);font-style:italic;font-weight:400}
.pills{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.pill{font-size:10px;padding:2px 7px;border-radius:100px;font-weight:500;white-space:nowrap}
.pill-bank{background:var(--surface2);color:var(--text2);border:.5px solid var(--border)}
.pill-paid{background:var(--green-bg);color:var(--green-text)}
.pill-overdue{background:var(--red-bg);color:var(--red)}
.pill-today{background:var(--blue-bg);color:var(--blue)}
.pill-soon{background:var(--amber-bg);color:var(--amber)}
.empty{text-align:center;padding:3rem 1rem;color:var(--text2);font-size:14px}
.empty i{font-size:32px;display:block;margin:0 auto 8px;color:var(--text3)}
.loading-state{text-align:center;padding:3rem 1rem;color:var(--text2);font-size:14px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:var(--rl);padding:1.5rem;max-width:440px;width:100%;border:.5px solid var(--border2)}
.modal h2{font-size:16px;font-weight:600;margin-bottom:1rem}
.modal-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:.5px solid var(--border);font-size:13px}
.modal-row:last-of-type{border-bottom:none}
.modal-label{color:var(--text2)}.modal-val{font-weight:500;max-width:220px;text-align:right}
.modal-close{margin-top:1rem;width:100%;padding:8px;background:var(--surface2);border:.5px solid var(--border);border-radius:var(--r);cursor:pointer;font-size:13px;font-family:inherit;color:var(--text)}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);padding:8px 18px;border-radius:100px;font-size:13px;opacity:0;transition:all .25s;pointer-events:none;z-index:200;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <div class="header-row">
    <div class="app-header">
      <h1><i class="ti ti-report-money"></i>Contas a Pagar</h1>
      <p id="subtitle">Carregando dados da planilha...</p>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
      <button class="refresh-btn" id="refreshBtn" onclick="syncSheet()">
        <i class="ti ti-refresh"></i> Sincronizar planilha
      </button>
      <div class="sync-info"><i class="ti ti-clock" style="font-size:12px"></i><span id="lastSync">aguardando...</span></div>
    </div>
  </div>
  <div class="toolbar">
    <div class="filter-group">
      <button class="filter-btn" onclick="setView('day')">Hoje</button>
      <button class="filter-btn active" onclick="setView('month')">Mes</button>
      <button class="filter-btn" onclick="setView('week')">Semana</button>
      <button class="filter-btn" onclick="setView('all')">Todos</button>
    </div>
    <div class="search-wrap">
      <i class="ti ti-search"></i>
      <input class="search-input" type="text" id="search" placeholder="Buscar fornecedor..." oninput="render()">
    </div>
    <div class="month-nav">
      <button class="nav-btn" onclick="prevMonth()"><i class="ti ti-chevron-left"></i></button>
      <span class="month-label" id="monthLabel"></span>
      <button class="nav-btn" onclick="nextMonth()"><i class="ti ti-chevron-right"></i></button>
    </div>
  </div>
  <div class="summary">
    <div class="stat"><div class="stat-label">Total fixo/mes</div><div class="stat-val" id="sTotal">-</div></div>
    <div class="stat"><div class="stat-label">Pendente</div><div class="stat-val c-amber" id="sPending">-</div></div>
    <div class="stat"><div class="stat-label">Pago este mes</div><div class="stat-val c-green" id="sPaid">-</div></div>
    <div class="stat"><div class="stat-label">Vencido</div><div class="stat-val c-red" id="sOverdue">-</div></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-header">
      <span>Progresso de pagamentos</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div id="list"><div class="loading-state"><i class="ti ti-loader" style="font-size:28px;display:block;margin:0 auto 8px"></i>Carregando planilha...</div></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <h2 id="modalTitle"></h2>
    <div id="modalContent"></div>
    <button class="modal-close" onclick="closeModal()">Fechar</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// URL CSV da planilha publicada
var CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSGN-eSmm-uYACPrCZLP6dFM_qz3eWhI3n-R2riUgNpA6qM_c_e55gyL7B0vFBiHfaSRmRLhsC6_BSu/pub?gid=0&single=true&output=csv';

var MONTHS = ['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var WDAYS  = ['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];

// BILLS e carregado dinamicamente da planilha — inicia vazio
var BILLS = [];

var viewMode = 'month';
var curMonth = new Date().getMonth();
var curYear  = new Date().getFullYear();
var paid = new Set(JSON.parse(localStorage.getItem('paid_v3') || '[]'));

function savePaid() { localStorage.setItem('paid_v3', JSON.stringify([...paid])); }
function pkey(id, d, m, y) { return id + '_' + d + '_' + m + '_' + y; }
function brl(v) { return v.toLocaleString('pt-BR', {style:'currency', currency:'BRL'}); }

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

// Analisa o campo Vencimento — retorna {days:[], special:false, weekly:false}
function parseVencimento(raw) {
  if (!raw) return {days:[1], special:false, weekly:false};
  var s = raw.trim().toUpperCase();

  // "5 DIA UTIL" ou "5 DU" ou "5 DIAS UTEIS"
  if (s.indexOf('UTIL') >= 0 || s.indexOf('DU') >= 0) {
    return {days:[], special:true, weekly:false};
  }
  // "SEMANAL"
  if (s.indexOf('SEMANAL') >= 0) {
    return {days:[], special:false, weekly:true};
  }
  // "12 E 27" ou "12,27"
  var multi = s.match(/(\d+)\s*[eE,]\s*(\d+)/);
  if (multi) {
    return {days:[parseInt(multi[1]), parseInt(multi[2])], special:false, weekly:false};
  }
  // numero simples
  var n = parseInt(s);
  if (!isNaN(n)) return {days:[n], special:false, weekly:false};

  return {days:[1], special:false, weekly:false};
}

// Retorna os dias do mes em que a conta vence
function billDays(bill, m, y) {
  if (bill.special) {
    // 5o dia util
    var count = 0, d = 1;
    while (count < 5) {
      var dow = new Date(y, m, d).getDay();
      if (dow !== 0 && dow !== 6) count++;
      if (count < 5) d++;
    }
    return [d];
  }
  if (bill.weekly) {
    var days = [], total = new Date(y, m+1, 0).getDate();
    for (var wd = 1; wd <= total; wd += 7) days.push(wd);
    return days;
  }
  var max = new Date(y, m+1, 0).getDate();
  return bill.days.map(function(d){ return Math.min(d, max); });
}

function getStatus(billDay, m, y, isPaid) {
  if (isPaid) return 'paid';
  var today = new Date(); today.setHours(0,0,0,0);
  var bd = new Date(y, m, billDay);
  if (bd < today) return 'overdue';
  if (bd.getTime() === today.getTime()) return 'today';
  if ((bd - today) / 86400000 <= 3) return 'soon';
  return 'normal';
}

function allEntries(m, y) {
  var result = [];
  BILLS.forEach(function(b) {
    billDays(b, m, y).forEach(function(d) {
      var k = pkey(b.id, d, m, y);
      result.push({
        id:b.id, name:b.name, alias:b.alias, value:b.value,
        variable:b.variable, bank:b.bank, desc:b.desc,
        special:b.special, weekly:b.weekly,
        billDay:d, key:k, isPaid:paid.has(k)
      });
    });
  });
  return result;
}

function filteredEntries() {
  var today = new Date();
  var q = (document.getElementById('search').value || '').toLowerCase();
  var entries = allEntries(curMonth, curYear);

  if (viewMode === 'day') {
    entries = entries.filter(function(e) {
      return e.billDay === today.getDate() && curMonth === today.getMonth() && curYear === today.getFullYear();
    });
  } else if (viewMode === 'week') {
    var ws = new Date(today); ws.setHours(0,0,0,0);
    var we = new Date(today); we.setDate(we.getDate()+6); we.setHours(23,59,59);
    entries = entries.filter(function(e) {
      var bd = new Date(curYear, curMonth, e.billDay);
      return bd >= ws && bd <= we;
    });
  }

  if (q) entries = entries.filter(function(e) {
    return (e.name||'').toLowerCase().indexOf(q) >= 0 ||
           (e.alias||'').toLowerCase().indexOf(q) >= 0 ||
           (e.desc||'').toLowerCase().indexOf(q) >= 0;
  });

  return entries.sort(function(a,b){ return a.billDay - b.billDay; });
}

function render() {
  document.getElementById('monthLabel').textContent = MONTHS[curMonth] + ' ' + curYear;

  if (BILLS.length === 0) {
    document.getElementById('list').innerHTML = '<div class="loading-state"><i class="ti ti-loader" style="font-size:28px;display:block;margin:0 auto 8px"></i>Aguardando planilha...</div>';
    return;
  }

  var all = allEntries(curMonth, curYear);
  var today = new Date(); today.setHours(0,0,0,0);

  var fixedTotal   = all.filter(function(e){ return !e.variable; }).reduce(function(s,e){ return s+e.value; }, 0);
  var paidTotal    = all.filter(function(e){ return e.isPaid && !e.variable; }).reduce(function(s,e){ return s+e.value; }, 0);
  var pendTotal    = all.filter(function(e){ return !e.isPaid && !e.variable; }).reduce(function(s,e){ return s+e.value; }, 0);
  var overdueTotal = all.filter(function(e){
    return !e.isPaid && !e.variable && new Date(curYear, curMonth, e.billDay) < today;
  }).reduce(function(s,e){ return s+e.value; }, 0);

  document.getElementById('sTotal').textContent    = brl(fixedTotal) + (all.some(function(e){ return e.variable; }) ? ' +var.' : '');
  document.getElementById('sPending').textContent  = brl(pendTotal);
  document.getElementById('sPaid').textContent     = brl(paidTotal);
  document.getElementById('sOverdue').textContent  = overdueTotal > 0 ? brl(overdueTotal) : '-';
  document.getElementById('subtitle').textContent  = BILLS.length + ' contas . ' + all.filter(function(e){ return e.isPaid; }).length + ' pagas este mes';

  var pct = fixedTotal > 0 ? Math.round((paidTotal / fixedTotal) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent  = pct + '%';

  var entries = filteredEntries();
  var list = document.getElementById('list');

  if (!entries.length) {
    list.innerHTML = '<div class="empty"><i class="ti ti-check"></i>Nenhuma conta neste periodo</div>';
    return;
  }

  var groups = {};
  entries.forEach(function(e) {
    if (!groups[e.billDay]) groups[e.billDay] = [];
    groups[e.billDay].push(e);
  });

  var todayD = today.getDate(), todayM = today.getMonth(), todayY = today.getFullYear();
  var html = '';

  Object.keys(groups).map(Number).sort(function(a,b){ return a-b; }).forEach(function(day) {
    var bd = new Date(curYear, curMonth, day);
    var isToday   = (day === todayD && curMonth === todayM && curYear === todayY);
    var isOverdue = (bd < today && !isToday);
    var lblCls    = isToday ? 'lbl-today' : isOverdue ? 'lbl-overdue' : '';
    var suffix    = isToday ? ' - hoje' : isOverdue ? ' - vencido' : '';

    html += '<div class="day-group"><div class="day-label ' + lblCls + '"><span class="dot"></span>Dia ' + day + ' . ' + WDAYS[bd.getDay()] + suffix + '</div>';

    groups[day].forEach(function(e) {
      var st = getStatus(e.billDay, curMonth, curYear, e.isPaid);
      var cardCls = e.isPaid ? 'paid' : st==='overdue' ? 'overdue' : st==='today' ? 'due-today' : st==='soon' ? 'due-soon' : '';
      var pill    = e.isPaid          ? '<span class="pill pill-paid">Pago</span>'
                  : st==='overdue'    ? '<span class="pill pill-overdue">Vencido</span>'
                  : st==='today'      ? '<span class="pill pill-today">Hoje</span>'
                  : st==='soon'       ? '<span class="pill pill-soon">Em breve</span>' : '';
      var valHtml = e.variable
        ? '<span class="bill-value var">Valor variavel</span>'
        : '<span class="bill-value">' + brl(e.value) + '</span>';

      html += '<div class="bill-card ' + cardCls + '" onclick="showDetail(\'' + e.key + '\')">'
        + '<button class="check-btn ' + (e.isPaid?'checked':'') + '" onclick="event.stopPropagation();togglePaid(\'' + e.key + '\')">'
        + '<i class="ti ti-check"></i></button>'
        + '<div class="bill-info"><div class="bill-name">' + (e.alias||e.name) + '</div>'
        + '<div class="bill-sub">' + (e.desc||'') + '</div></div>'
        + '<div class="bill-right">' + valHtml
        + '<div class="pills">' + pill + '<span class="pill pill-bank">' + (e.bank||'') + '</span></div></div></div>';
    });
    html += '</div>';
  });
  list.innerHTML = html;
}

function togglePaid(key) {
  paid.has(key) ? paid.delete(key) : paid.add(key);
  savePaid();
  render();
  toast(paid.has(key) ? 'Marcado como pago' : 'Desmarcado');
}

function showDetail(key) {
  var all = allEntries(curMonth, curYear);
  var e = all.find(function(x){ return x.key === key; });
  if (!e) return;
  document.getElementById('modalTitle').textContent = e.alias || e.name;
  document.getElementById('modalContent').innerHTML =
    '<div class="modal-row"><span class="modal-label">Fornecedor</span><span class="modal-val">' + e.name + '</span></div>'
    + '<div class="modal-row"><span class="modal-label">Descricao</span><span class="modal-val">' + (e.desc||'-') + '</span></div>'
    + '<div class="modal-row"><span class="modal-label">Vencimento</span><span class="modal-val">Dia ' + e.billDay + (e.special?' (5 dia util)':'') + (e.weekly?' (semanal)':'') + '</span></div>'
    + '<div class="modal-row"><span class="modal-label">Valor</span><span class="modal-val">' + (e.variable ? 'Variavel' : brl(e.value)) + '</span></div>'
    + '<div class="modal-row"><span class="modal-label">Pagamento via</span><span class="modal-val">' + (e.bank||'-') + '</span></div>'
    + '<div class="modal-row"><span class="modal-label">Status</span><span class="modal-val">' + (e.isPaid?'Pago':'Pendente') + '</span></div>'
    + '<div style="margin-top:1rem"><button class="modal-close" style="background:' + (e.isPaid?'var(--red-bg);color:var(--red)':'var(--green-bg);color:var(--green-text)') + '" onclick="togglePaid(\'' + e.key + '\');closeModal()">' + (e.isPaid?'Desmarcar pagamento':'Marcar como pago') + '</button></div>';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(ev) {
  if (!ev || ev.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
}

function setView(v) {
  viewMode = v;
  document.querySelectorAll('.filter-btn').forEach(function(b,i){
    b.classList.toggle('active', ['day','month','week','all'][i] === v);
  });
  render();
}
function prevMonth(){ if(curMonth===0){curMonth=11;curYear--;}else curMonth--; render(); }
function nextMonth(){ if(curMonth===11){curMonth=0;curYear++;}else curMonth++; render(); }

// ── CSV parser ────────────────────────────────────────────
function parseCSVLine(line) {
  var result=[], cur='', inQ=false;
  for (var i=0; i<line.length; i++) {
    var c=line[i];
    if (c==='"') { inQ=!inQ; }
    else if (c===',' && !inQ) { result.push(cur.trim()); cur=''; }
    else { cur+=c; }
  }
  result.push(cur.trim());
  return result;
}

function parseSheet(csv) {
  var lines = csv.split('\n');

  // Encontra linha do cabecalho (contem "Fornecedor")
  var hIdx = -1;
  for (var i=0; i<Math.min(lines.length,5); i++) {
    if (lines[i].toLowerCase().indexOf('fornecedor') >= 0) { hIdx=i; break; }
  }
  var dataLines = lines.slice(hIdx >= 0 ? hIdx+1 : 1);

  var newBills = [];
  var id = 1;

  dataLines.forEach(function(line) {
    var trimmed = line.trim();
    if (!trimmed || trimmed === ',,,,,,,') return;

    var cols = parseCSVLine(trimmed);
    // cols: 0=Fornecedor, 1=Valor, 2=Vencimento, 3=PagMensal, 4=Historico, 5=DescExtrato, 6=Pagamento
    var fornecedor = (cols[0]||'').replace(/^"|"$/g,'').trim();
    var valorRaw   = (cols[1]||'').replace(/^"|"$/g,'').trim();
    var vencRaw    = (cols[2]||'').replace(/^"|"$/g,'').trim();
    var descExt    = (cols[5]||'').replace(/^"|"$/g,'').trim(); // Descricao Extrato = alias
    var banco      = (cols[6]||'').replace(/^"|"$/g,'').trim();
    var historico  = (cols[4]||'').replace(/^"|"$/g,'').trim();

    if (!fornecedor) return;

    // Valor
    // Formato brasileiro: 1.000,00 -> remover pontos de milhar, trocar virgula por ponto
    var cleanVal = valorRaw.replace(/[^0-9,.]/g,'');
    // Se tem virgula E ponto: ponto eh milhar, virgula eh decimal (1.000,00)
    // Se tem so virgula: virgula eh decimal (1000,50)
    // Se tem so ponto: pode ser decimal americano (1000.50)
    if (cleanVal.indexOf(',') >= 0) {
      cleanVal = cleanVal.replace(/\./g,'').replace(',','.');
    }
    var val = parseFloat(cleanVal);
    var isVariable = isNaN(val) || val <= 0 || valorRaw.toLowerCase().indexOf('vari') >= 0;

    // Vencimento
    var venc = parseVencimento(vencRaw);

    // Alias: usa descricao extrato bancario se disponivel, senao o nome
    var alias = descExt || fornecedor;

    newBills.push({
      id: id++,
      name: fornecedor,
      alias: alias,
      value: isVariable ? 0 : val,
      variable: isVariable,
      days: venc.days,
      special: venc.special,
      weekly: venc.weekly,
      bank: banco,
      desc: historico
        .replace(/ref\.?\s*MM\/AAAA[^,]*/gi,'')
        .replace(/n[\°o]?\s*[xX]+\/\d+/g,'')
        .replace(/\s+-\s*$/,'')
        .replace(/,\s*$/,'')
        .trim()
    });
  });

  if (newBills.length > 0) {
    BILLS = newBills;
  }
  return newBills.length;
}

// ── Fetch com fallback de proxies ─────────────────────────
async function fetchCSV() {
  var t = '&nocache=' + Date.now();
  // Direto
  try {
    var r = await fetch(CSV_URL + t, {cache:'no-store', mode:'cors'});
    if (r.ok) { var txt=await r.text(); if (txt.indexOf(',')>=0) return txt; }
  } catch(e){}
  // allorigins
  try {
    var r2 = await fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(CSV_URL+t), {cache:'no-store'});
    if (r2.ok) { var txt2=await r2.text(); if (txt2.indexOf(',')>=0) return txt2; }
  } catch(e){}
  // corsproxy
  try {
    var r3 = await fetch('https://corsproxy.io/?'+encodeURIComponent(CSV_URL), {cache:'no-store'});
    if (r3.ok) { var txt3=await r3.text(); if (txt3.indexOf(',')>=0) return txt3; }
  } catch(e){}
  throw new Error('Todos os proxies falharam');
}

async function syncSheet() {
  var btn = document.getElementById('refreshBtn');
  btn.classList.add('loading'); btn.disabled = true;
  try {
    var csv = await fetchCSV();
    var n = parseSheet(csv);
    var now = new Date().toLocaleTimeString('pt-BR');
    document.getElementById('lastSync').textContent = 'Sincronizado: ' + now;
    toast(n + ' contas carregadas da planilha');
  } catch(e) {
    document.getElementById('lastSync').textContent = 'Sync falhou';
    console.warn('Sync error:', e);
    if (BILLS.length === 0) {
      document.getElementById('list').innerHTML = '<div class="empty"><i class="ti ti-wifi-off"></i>Nao foi possivel carregar a planilha.<br>Verifique se ela esta publicada e tente novamente.</div>';
    }
  }
  btn.classList.remove('loading'); btn.disabled = false;
  render();
}

// Auto-sync a cada 3 minutos
setInterval(syncSheet, 3 * 60 * 1000);

// Inicia
syncSheet();
</script>
