<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contas a Pagar — Liparini</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --surface2: #f1f0ed;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text2: #6b6a65;
    --text3: #9b9a95;
    --blue: #185FA5;
    --blue-bg: #E6F1FB;
    --green: #1D9E75;
    --green-bg: #EAF3DE;
    --green-text: #3B6D11;
    --amber: #854F0B;
    --amber-bg: #FAEEDA;
    --red: #A32D2D;
    --red-bg: #FCEBEB;
    --radius: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #252522;
      --surface2: #2e2e2b;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
      --text: #f0efe9;
      --text2: #a09f99;
      --text3: #6b6a65;
      --blue: #85B7EB;
      --blue-bg: #042C53;
      --green: #5DCAA5;
      --green-bg: #04342C;
      --green-text: #9FE1CB;
      --amber: #FAC775;
      --amber-bg: #412402;
      --red: #F09595;
      --red-bg: #501313;
    }
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  .app { max-width: 860px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

  /* HEADER */
  .app-header { margin-bottom: 1.25rem; }
  .app-header h1 { font-size: 22px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .app-header h1 i { font-size: 22px; color: var(--blue); }
  .app-header p { font-size: 13px; color: var(--text2); margin-top: 3px; }
  .header-row { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .sync-info { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 5px; margin-top: 6px; }

  /* TOOLBAR */
  .toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .filter-group { display: flex; background: var(--surface2); border-radius: var(--radius); border: 0.5px solid var(--border); overflow: hidden; flex-shrink: 0; }
  .filter-btn { padding: 6px 14px; font-size: 13px; background: transparent; border: none; cursor: pointer; color: var(--text2); transition: all 0.15s; font-family: inherit; }
  .filter-btn.active { background: var(--surface); color: var(--text); font-weight: 500; box-shadow: 0 0 0 0.5px var(--border2) inset; }
  .search-wrap { position: relative; flex: 1; min-width: 160px; }
  .search-wrap i { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 15px; pointer-events: none; }
  .search-input { width: 100%; padding: 6px 10px 6px 30px; font-size: 13px; border-radius: var(--radius); border: 0.5px solid var(--border); background: var(--surface); color: var(--text); font-family: inherit; outline: none; }
  .search-input:focus { border-color: var(--border2); }
  .month-nav { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .nav-btn { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 5px 9px; cursor: pointer; color: var(--text2); font-size: 16px; display: flex; align-items: center; transition: border-color 0.15s; }
  .nav-btn:hover { border-color: var(--border2); }
  .month-label { font-size: 13px; font-weight: 500; min-width: 120px; text-align: center; color: var(--text); }
  .refresh-btn { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 6px 12px; cursor: pointer; font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 5px; font-family: inherit; transition: border-color 0.15s; flex-shrink: 0; }
  .refresh-btn:hover { border-color: var(--border2); color: var(--text); }
  .refresh-btn.loading i { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* SUMMARY */
  .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1.25rem; }
  @media (max-width: 600px) { .summary { grid-template-columns: repeat(2, 1fr); } }
  .stat { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 12px 14px; }
  .stat-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-val { font-size: 17px; font-weight: 600; color: var(--text); margin-top: 3px; line-height: 1.2; }
  .stat-val.c-red { color: var(--red); }
  .stat-val.c-green { color: var(--green); }
  .stat-val.c-amber { color: var(--amber); }

  /* PROGRESS BAR */
  .progress-wrap { margin-bottom: 1.25rem; }
  .progress-header { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 5px; }
  .progress-bar { height: 6px; background: var(--surface2); border-radius: 100px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 100px; transition: width 0.4s ease; }

  /* LISTS */
  .day-group { margin-bottom: 1.25rem; }
  .day-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; padding: 0 2px 6px; display: flex; align-items: center; gap: 6px; border-bottom: 0.5px solid var(--border); margin-bottom: 6px; }
  .day-label .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border2); flex-shrink: 0; }
  .day-label.lbl-today .dot { background: var(--blue); }
  .day-label.lbl-today { color: var(--blue); }
  .day-label.lbl-overdue .dot { background: var(--red); }
  .day-label.lbl-overdue { color: var(--red); }

  .bill-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 10px 14px; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: border-color 0.15s, opacity 0.2s; user-select: none; }
  .bill-card:hover { border-color: var(--border2); }
  .bill-card.paid { opacity: 0.5; }
  .bill-card.overdue { border-left: 3px solid var(--red); }
  .bill-card.due-today { border-left: 3px solid var(--blue); }
  .bill-card.due-soon { border-left: 3px solid var(--amber); }

  .check-btn { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border2); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
  .check-btn.checked { background: var(--green); border-color: var(--green); }
  .check-btn i { font-size: 12px; color: white; opacity: 0; transition: opacity 0.15s; }
  .check-btn.checked i { opacity: 1; }

  .bill-info { flex: 1; min-width: 0; }
  .bill-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: text-decoration 0.15s; }
  .bill-card.paid .bill-name { text-decoration: line-through; color: var(--text2); }
  .bill-sub { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }

  .bill-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .bill-value { font-size: 14px; font-weight: 600; }
  .bill-value.var { font-size: 12px; color: var(--text2); font-style: italic; font-weight: 400; }
  .pills { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
  .pill { font-size: 10px; padding: 2px 7px; border-radius: 100px; font-weight: 500; white-space: nowrap; }
  .pill-bank { background: var(--surface2); color: var(--text2); border: 0.5px solid var(--border); }
  .pill-paid { background: var(--green-bg); color: var(--green-text); }
  .pill-overdue { background: var(--red-bg); color: var(--red); }
  .pill-today { background: var(--blue-bg); color: var(--blue); }
  .pill-soon { background: var(--amber-bg); color: var(--amber); }

  .empty { text-align: center; padding: 3rem 1rem; color: var(--text2); font-size: 14px; }
  .empty i { font-size: 32px; display: block; margin: 0 auto 8px; color: var(--text3); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border-radius: var(--radius-lg); padding: 1.5rem; max-width: 440px; width: 100%; border: 0.5px solid var(--border2); }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
  .modal-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
  .modal-row:last-of-type { border-bottom: none; }
  .modal-label { color: var(--text2); }
  .modal-val { font-weight: 500; max-width: 220px; text-align: right; }
  .modal-close { margin-top: 1rem; width: 100%; padding: 8px; background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--radius); cursor: pointer; font-size: 13px; font-family: inherit; color: var(--text); transition: background 0.15s; }
  .modal-close:hover { background: var(--border); }

  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: var(--bg); padding: 8px 18px; border-radius: 100px; font-size: 13px; opacity: 0; transition: all 0.25s; pointer-events: none; z-index: 200; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="app">
  <div class="header-row">
    <div class="app-header">
      <h1><i class="ti ti-report-money"></i>Contas a Pagar</h1>
      <p id="subtitle">Carregando dados...</p>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
      <button class="refresh-btn" id="refreshBtn" onclick="syncSheet()">
        <i class="ti ti-refresh"></i> Sincronizar planilha
      </button>
      <div class="sync-info"><i class="ti ti-clock" style="font-size:12px"></i> <span id="lastSync">—</span></div>
    </div>
  </div>

  <div class="toolbar">
    <div class="filter-group">
      <button class="filter-btn" onclick="setView('day')">Hoje</button>
      <button class="filter-btn active" onclick="setView('month')">Mês</button>
      <button class="filter-btn" onclick="setView('week')">Semana</button>
      <button class="filter-btn" onclick="setView('all')">Todos</button>
    </div>
    <div class="search-wrap">
      <i class="ti ti-search"></i>
      <input class="search-input" type="text" id="search" placeholder="Buscar fornecedor ou descrição..." oninput="render()">
    </div>
    <div class="month-nav">
      <button class="nav-btn" onclick="prevMonth()"><i class="ti ti-chevron-left"></i></button>
      <span class="month-label" id="monthLabel"></span>
      <button class="nav-btn" onclick="nextMonth()"><i class="ti ti-chevron-right"></i></button>
    </div>
  </div>

  <div class="summary">
    <div class="stat"><div class="stat-label">Total fixo/mês</div><div class="stat-val" id="sTotal">—</div></div>
    <div class="stat"><div class="stat-label">Pendente</div><div class="stat-val c-amber" id="sPending">—</div></div>
    <div class="stat"><div class="stat-label">Pago este mês</div><div class="stat-val c-green" id="sPaid">—</div></div>
    <div class="stat"><div class="stat-label">Vencido</div><div class="stat-val c-red" id="sOverdue">—</div></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-header">
      <span id="progressLabel">Progresso de pagamentos — mês atual</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div id="list"></div>
</div>

<!-- Modal de detalhes -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <h2 id="modalTitle"></h2>
    <div id="modalContent"></div>
    <button class="modal-close" onclick="closeModal()">Fechar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SHEET_ID = '1BpwZTxr5aL52cF3orSdbCp-aXLRqeWBLt3fuDa0et_U';
const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const WDAYS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

const BILLS = [
  {id:1,  name:'OXIGAS RESIDUOS ESPECIAIS LTDA',         alias:'Oxigas',                  value:315,    variable:false, day:2,  bank:'SICOOB',   desc:'Coleta de resíduos'},
  {id:2,  name:'Sicoob',                                  alias:'Sicoob – Capital',        value:50,     variable:false, day:2,  bank:'SICOOB',   desc:'Integralização de Capital'},
  {id:3,  name:'MONEST COBRANCAS S.A',                    alias:'Monest',                  value:199.90, variable:false, day:5,  bank:'SICOOB',   desc:'Licença de uso'},
  {id:4,  name:'EMPRESA BRASILEIRA DE CORREIOS',          alias:'Correios',                value:0,      variable:true,  day:5,  bank:'SICOOB',   desc:'Frete dos correios'},
  {id:5,  name:'SALÁRIOS DE FUNCIONÁRIOS',                alias:'Salários Funcionários',   value:0,      variable:true,  day:5,  special:'5° DU', bank:'SICOOB', desc:'Salários'},
  {id:6,  name:'ANDRE LUIZ DUARTE FERREIRA',              alias:'Serviços – André',        value:650,    variable:false, day:5,  bank:'DINHEIRO', desc:'Prestação de Serviço'},
  {id:7,  name:'P.B&E LABORATORIO OTICO LTDA',            alias:'P.B&E Lab Ótico',         value:0,      variable:true,  day:6,  bank:'SICOOB',   desc:'Tratamento Anti Risco'},
  {id:8,  name:'Contabilidade Lima LTDA',                 alias:'Contabilidade',           value:810.50, variable:false, day:10, bank:'SICOOB',   desc:'Prestação de Serviço'},
  {id:9,  name:'TRANSITANDO SERVIÇOS EXPRESSOS LTDA',     alias:'MotoFrete',               value:1450,   variable:false, day:10, bank:'SICOOB',   desc:'Serviços de MotoFrete'},
  {id:10, name:'LWSA S/A',                                alias:'Bling',                   value:650,    variable:false, day:12, bank:'SICOOB',   desc:'Mensalidade Bling'},
  {id:11, name:'CAMARA DOS DIRIGENTES LOJISTAS BH',       alias:'CDL | Unimed',            value:0,      variable:true,  day:12, bank:'SICOOB',   desc:'Mensalidade CDL'},
  {id:12, name:'MAGNO ALBERTO MORAIS CARRARO',            alias:'Serviços – Magno',        value:800,    variable:false, day:12, bank:'SICOOB',   desc:'Serviços Prestados'},
  {id:13, name:'CONSORCIO VALE TRANSPORTE (1ª)',          alias:'Vale Transporte 1ª',      value:0,      variable:true,  day:12, bank:'SICOOB',   desc:'Vale Transporte'},
  {id:14, name:'Caixa Economica Federal',                 alias:'Empréstimo CEF',          value:0,      variable:true,  day:14, bank:'CAIXA',    desc:'Prestação do empréstimo'},
  {id:15, name:'Conta Vivo Internet/Telefone',            alias:'Telefone/Internet',       value:0,      variable:true,  day:17, bank:'DINHEIRO', desc:'Internet e Telefone'},
  {id:16, name:'DIXI VEXT SISTEMAS LTDA',                 alias:'Ponto Eletrônico',        value:70,     variable:false, day:20, bank:'SICOOB',   desc:'Sistema de Ponto'},
  {id:17, name:'Caixa Economica Federal',                 alias:'FGTS',                    value:0,      variable:true,  day:20, bank:'SICOOB',   desc:'FGTS'},
  {id:18, name:'Documento de Arrecadação Simples',        alias:'DAS – Simples Nacional',  value:0,      variable:true,  day:20, bank:'SICOOB',   desc:'DAS mensal'},
  {id:19, name:'Documentos de Arrecadação Federal',       alias:'DCTF',                    value:0,      variable:true,  day:20, bank:'SICOOB',   desc:'Arrecadação Federal'},
  {id:20, name:'Documento de Arrecadação Estadual',       alias:'ICMS',                    value:0,      variable:true,  day:20, bank:'SICOOB',   desc:'Arrecadação Estadual'},
  {id:21, name:'PERCILIA VELOSO NETO',                    alias:'Adiantamento – Percilia', value:0,      variable:true,  day:20, bank:'SICOOB',   desc:'Adiantamento de Salário'},
  {id:22, name:'Andorinha Energia Solar',                 alias:'Energia Solar',           value:0,      variable:true,  day:22, bank:'SICOOB',   desc:'Energia Solar'},
  {id:23, name:'CEMIG',                                   alias:'CEMIG',                   value:0,      variable:true,  day:22, bank:'SICOOB',   desc:'Conta de energia'},
  {id:24, name:'EMPRESA BRASILEIRA DE BENEFICIOS',        alias:'Premiação Funcionários',  value:0,      variable:true,  day:25, bank:'SICOOB',   desc:'Premiação'},
  {id:25, name:'CAROLINE INACIA PINTO',                   alias:'Serviços – Carol',        value:1000,   variable:false, day:25, bank:'SICOOB',   desc:'Capacitação em sistemas'},
  {id:26, name:'Caixa Economica Federal',                 alias:'Cesta de Serviços CEF',   value:0,      variable:true,  day:25, bank:'CAIXA',    desc:'Cesta de Serviços'},
  {id:27, name:'CONSORCIO VALE TRANSPORTE (2ª)',          alias:'Vale Transporte 2ª',      value:0,      variable:true,  day:27, bank:'SICOOB',   desc:'Vale Transporte'},
  {id:28, name:'DAS – Parcelamento',                      alias:'DAS – Parcelamento',      value:0,      variable:true,  day:30, bank:'SICOOB',   desc:'Simples Parcelado'},
  {id:29, name:'ESTRELA – DISTRIBUIDORA (Aluguel)',       alias:'Aluguel',                 value:3850,   variable:false, day:30, bank:'SICOOB',   desc:'Pagamento de Aluguel'},
];

let viewMode = 'month';
let curMonth = new Date().getMonth();
let curYear  = new Date().getFullYear();
let paid = new Set(JSON.parse(localStorage.getItem('paid_v2') || '[]'));
let sheetData = null;

function savePaid() { localStorage.setItem('paid_v2', JSON.stringify([...paid])); }
function pkey(id, d, m, y) { return `${id}_${d}_${m}_${y}`; }

function brl(v) { return v.toLocaleString('pt-BR', {style:'currency', currency:'BRL'}); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function workingDay(n, m, y) {
  let count = 0, d = 1;
  while (count < n) {
    const dow = new Date(y, m, d).getDay();
    if (dow !== 0 && dow !== 6) count++;
    if (count < n) d++;
  }
  return d;
}

function billDays(bill, m, y) {
  if (bill.special) return [workingDay(5, m, y)];
  const max = new Date(y, m+1, 0).getDate();
  return [Math.min(bill.day, max)];
}

function getStatus(billDay, m, y, isPaid) {
  if (isPaid) return 'paid';
  const today = new Date(); today.setHours(0,0,0,0);
  const bd = new Date(y, m, billDay);
  if (bd < today) return 'overdue';
  if (bd.getTime() === today.getTime()) return 'today';
  if ((bd - today) / 86400000 <= 3) return 'soon';
  return 'normal';
}

function allEntries(m, y) {
  return BILLS.flatMap(b => billDays(b, m, y).map(d => {
    const k = pkey(b.id, d, m, y);
    return { ...b, billDay: d, key: k, isPaid: paid.has(k) };
  }));
}

function filteredEntries() {
  const today = new Date();
  const q = document.getElementById('search').value.toLowerCase();
  let entries = allEntries(curMonth, curYear);

  if (viewMode === 'day') {
    entries = entries.filter(e =>
      e.billDay === today.getDate() && curMonth === today.getMonth() && curYear === today.getFullYear());
  } else if (viewMode === 'week') {
    const ws = new Date(today); ws.setHours(0,0,0,0);
    const we = new Date(today); we.setDate(we.getDate()+6); we.setHours(23,59,59);
    entries = entries.filter(e => { const bd = new Date(curYear, curMonth, e.billDay); return bd >= ws && bd <= we; });
  } else if (viewMode === 'month') {
    // all in curMonth
  }
  if (q) entries = entries.filter(e =>
    e.name.toLowerCase().includes(q) || e.alias.toLowerCase().includes(q) || e.desc.toLowerCase().includes(q));

  return entries.sort((a,b) => a.billDay - b.billDay);
}

function render() {
  document.getElementById('monthLabel').textContent = `${MONTHS[curMonth]} ${curYear}`;

  const all = allEntries(curMonth, curYear);
  const fixedTotal = all.filter(e=>!e.variable).reduce((s,e)=>s+e.value, 0);
  const paidTotal  = all.filter(e=>e.isPaid && !e.variable).reduce((s,e)=>s+e.value, 0);
  const pendTotal  = all.filter(e=>!e.isPaid && !e.variable).reduce((s,e)=>s+e.value, 0);
  const today = new Date(); today.setHours(0,0,0,0);
  const overdueTotal = all.filter(e=>{
    const bd = new Date(curYear, curMonth, e.billDay);
    return !e.isPaid && !e.variable && bd < today;
  }).reduce((s,e)=>s+e.value, 0);

  document.getElementById('sTotal').textContent = brl(fixedTotal) + (all.some(e=>e.variable) ? ' +var.' : '');
  document.getElementById('sPending').textContent = brl(pendTotal);
  document.getElementById('sPaid').textContent = brl(paidTotal);
  document.getElementById('sOverdue').textContent = overdueTotal > 0 ? brl(overdueTotal) : '—';

  const pct = fixedTotal > 0 ? Math.round((paidTotal / fixedTotal) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';

  const count = all.length;
  const paidCount = all.filter(e=>e.isPaid).length;
  document.getElementById('subtitle').textContent =
    `${count} contas cadastradas • ${paidCount} pagas este mês`;

  const entries = filteredEntries();
  const list = document.getElementById('list');

  if (!entries.length) {
    list.innerHTML = '<div class="empty"><i class="ti ti-check"></i>Nenhuma conta neste período</div>';
    return;
  }

  const groups = {};
  for (const e of entries) {
    if (!groups[e.billDay]) groups[e.billDay] = [];
    groups[e.billDay].push(e);
  }

  const todayD = today.getDate(), todayM = today.getMonth(), todayY = today.getFullYear();
  let html = '';

  for (const day of Object.keys(groups).map(Number).sort((a,b)=>a-b)) {
    const bd = new Date(curYear, curMonth, day);
    const isToday   = day === todayD && curMonth === todayM && curYear === todayY;
    const isOverdue = bd < today && !isToday;
    const lblCls = isToday ? 'lbl-today' : isOverdue ? 'lbl-overdue' : '';
    const wday = WDAYS[bd.getDay()];
    const suffix = isToday ? ' — hoje' : isOverdue ? ' — vencido' : '';

    html += `<div class="day-group">
      <div class="day-label ${lblCls}">
        <span class="dot"></span>
        Dia ${day} &nbsp;·&nbsp; ${wday}${suffix}
      </div>`;

    for (const e of groups[day]) {
      const st = getStatus(e.billDay, curMonth, curYear, e.isPaid);
      const cardCls = e.isPaid ? 'paid' : st === 'overdue' ? 'overdue' : st === 'today' ? 'due-today' : st === 'soon' ? 'due-soon' : '';
      const pill = e.isPaid
        ? `<span class="pill pill-paid">Pago</span>`
        : st === 'overdue' ? `<span class="pill pill-overdue">Vencido</span>`
        : st === 'today'   ? `<span class="pill pill-today">Hoje</span>`
        : st === 'soon'    ? `<span class="pill pill-soon">Em breve</span>` : '';
      const valHtml = e.variable
        ? `<span class="bill-value var">Valor variável</span>`
        : `<span class="bill-value">${brl(e.value)}</span>`;

      html += `<div class="bill-card ${cardCls}" onclick="showDetail('${e.key}')">
        <button class="check-btn ${e.isPaid?'checked':''}" aria-label="Marcar pago"
          onclick="event.stopPropagation();togglePaid('${e.key}')">
          <i class="ti ti-check" aria-hidden="true"></i>
        </button>
        <div class="bill-info">
          <div class="bill-name">${e.alias}</div>
          <div class="bill-sub">${e.desc} &nbsp;·&nbsp; Dia ${e.billDay}</div>
        </div>
        <div class="bill-right">
          ${valHtml}
          <div class="pills">${pill}<span class="pill pill-bank">${e.bank}</span></div>
        </div>
      </div>`;
    }
    html += '</div>';
  }
  list.innerHTML = html;
}

function togglePaid(key) {
  paid.has(key) ? paid.delete(key) : paid.add(key);
  savePaid();
  render();
  toast(paid.has(key) ? '✓ Marcado como pago' : 'Desmarcado');
}

// Detalhe modal
const ENTRY_MAP = {};
function showDetail(key) {
  const all = allEntries(curMonth, curYear);
  const e = all.find(x => x.key === key);
  if (!e) return;
  document.getElementById('modalTitle').textContent = e.alias;
  document.getElementById('modalContent').innerHTML = `
    <div class="modal-row"><span class="modal-label">Fornecedor</span><span class="modal-val">${e.name}</span></div>
    <div class="modal-row"><span class="modal-label">Descrição</span><span class="modal-val">${e.desc}</span></div>
    <div class="modal-row"><span class="modal-label">Vencimento</span><span class="modal-val">Dia ${e.billDay}${e.special?' ('+e.special+')':''}</span></div>
    <div class="modal-row"><span class="modal-label">Valor</span><span class="modal-val">${e.variable ? 'Variável' : brl(e.value)}</span></div>
    <div class="modal-row"><span class="modal-label">Pagamento via</span><span class="modal-val">${e.bank}</span></div>
    <div class="modal-row"><span class="modal-label">Status</span><span class="modal-val">${e.isPaid ? '✓ Pago' : 'Pendente'}</span></div>
    <div style="margin-top:1rem">
      <button class="modal-close" style="background:${e.isPaid?'var(--red-bg)':'var(--green-bg)'};color:${e.isPaid?'var(--red)':'var(--green-text)'};"
        onclick="togglePaid('${e.key}');closeModal()">
        ${e.isPaid ? 'Desmarcar pagamento' : '✓ Marcar como pago'}
      </button>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(ev) {
  if (!ev || ev.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
}

function setView(v) {
  viewMode = v;
  document.querySelectorAll('.filter-btn').forEach((b,i) => {
    b.classList.toggle('active', ['day','month','week','all'][i] === v);
  });
  render();
}
function prevMonth() { if(curMonth===0){curMonth=11;curYear--;}else curMonth--; render(); }
function nextMonth() { if(curMonth===11){curMonth=0;curYear++;}else curMonth++; render(); }

async function syncSheet() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');
  btn.disabled = true;
  try {
    // Tenta buscar CSV público da planilha
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&cachebust=${Date.now()}`;
    const res = await fetch(url);
    if (res.ok) {
      const csv = await res.text();
      parseSheet(csv);
      const now = new Date().toLocaleTimeString('pt-BR');
      document.getElementById('lastSync').textContent = `Última sync: ${now}`;
      toast('Planilha sincronizada!');
    } else {
      throw new Error('HTTP ' + res.status);
    }
  } catch(e) {
    document.getElementById('lastSync').textContent = 'Sync falhou — usando dados locais';
    toast('Usando dados da planilha local');
  }
  btn.classList.remove('loading');
  btn.disabled = false;
  render();
}

function parseSheet(csv) {
  const lines = csv.split('\n').slice(1);
  lines.forEach((line, i) => {
    const cols = line.split(',');
    if (!cols[0]) return;
    const raw = cols[1]?.replace(/[^0-9,.]/g,'').replace(',','.');
    const val = parseFloat(raw);
    if (!isNaN(val) && BILLS[i]) {
      BILLS[i].value = val;
      BILLS[i].variable = false;
    }
  });
}

// Init
(async () => {
  render();
  await syncSheet();
})();
</script>
